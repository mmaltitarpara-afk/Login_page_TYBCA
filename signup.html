<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Signup Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:16px;
    transition:0.3s;
}

.input-box input:focus{
    border-color:#4facfe;
    box-shadow:0 0 8px rgba(79,172,254,0.5);
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#008cff;
}

.login-link{
    text-align:center;
    margin-top:18px;
    font-size:15px;
}

.login-link a{
    color:#4facfe;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="container">
    <h2>Create Account</h2>

    <form>
        <div class="input-box">
            <input type="text" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email Address" required>
        </div>

        <div class="input-box">
            <input type="tel" placeholder="Phone Number" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="btn">Sign Up</button>

        <div class="login-link">
            Already have an account?
            <a href="#">Login</a>
        </div>
    </form>
</div>

</body>
</html>
