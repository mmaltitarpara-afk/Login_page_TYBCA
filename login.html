<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.login-box{
    width:380px;
    padding:40px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:15px;
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
    color:#fff;
}

.login-box h2{
    text-align:center;
    margin-bottom:10px;
    font-size:32px;
}

.login-box p{
    text-align:center;
    margin-bottom:30px;
    color:#eee;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:16px;
    background:#fff;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    font-size:14px;
}

.options a{
    color:#fff;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:14px;
    background:#00c6ff;
    border:none;
    border-radius:8px;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0099cc;
    transform:translateY(-2px);
}

.signup{
    margin-top:25px;
    text-align:center;
}

.signup a{
    color:#00e6ff;
    text-decoration:none;
    font-weight:bold;
}

.signup a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Welcome Back</h2>
    <p>Sign in to continue</p>

    <form>
        <div class="input-box">
            <input type="email" placeholder="Email Address" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Remember Me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>

        <div class="signup">
            Don't have an account?
            <a href="#">Sign Up</a>
        </div>
    </form>
</div>

</body>
</html>
